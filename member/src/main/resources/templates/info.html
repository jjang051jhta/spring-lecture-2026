<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>MEMBER</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-base-200">

<header th:replace="~{fragments/header::my-header}"></header>


<main class="container mx-auto p-6">
  <h1 class="text-3xl font-bold">회원정보</h1>
  <table>
    <tr>
      <th>이름</th>
      <td th:text="${loggedMemberDto.userName}">장성호</td>
    </tr>
    <tr>
      <th>우편번호</th>
      <td th:text="${loggedMemberDto.zipcode}">12345</td>
    </tr>
    <tr>
      <th>address</th>
      <td th:text="${loggedMemberDto.address}">장항동</td>
    </tr>
    <tr>
      <th>상제주소</th>
      <td th:text="${loggedMemberDto.detailAddress}">111-111</td>
    </tr>


  </table>
</main>
<header th:replace="~{fragments/footer::my-footer}"></header>

</body>
</html>
