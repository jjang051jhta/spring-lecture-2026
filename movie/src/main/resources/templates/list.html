<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>영화예매</h1>
<ul>
    <li th:each="item:${movieList}">
        <span th:text="${item.no}">1</span>
        <span th:text="${item.title}">범죄도시</span>
        <span th:text="${item.reserveYn}">N</span>
    </li>
</ul>
<div>
    <form action="/movie/write" method="post">
        <div><input type="text" placeholder="영화제목을 입력하세요."></div>
        <div><button>영화 등록</button></div>
    </form>
</div>
</body>
</html>
