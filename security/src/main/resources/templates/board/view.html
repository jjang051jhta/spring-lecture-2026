<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 보기</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-base-200 flex flex-col">

<!-- HEADER -->
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- MAIN -->
<main class="flex-1 max-w-5xl mx-auto w-full px-4 py-10">

    <div class="card bg-base-100 shadow-xl">

        <div class="card-body">

            <!-- 제목 -->
            <h1 class="text-3xl font-bold mb-6"
                th:text="${boardDto.title}">
                게시글 제목
            </h1>

            <!-- 작성 정보 -->
            <div class="grid md:grid-cols-3 gap-4 mb-6 border-b pb-5">

                <div>
                    <span class="font-semibold">작성자</span><br>
                    <span th:text="${boardDto.author}">
                        홍길동
                    </span>
                </div>

                <div>
                    <span class="font-semibold">조회수</span><br>
                    <span th:text="${boardDto.hit}">
                        0
                    </span>
                </div>

                <div>
                    <span class="font-semibold">작성일</span><br>
                    <span th:text="${#temporals.format(boardDto.regDate,'yyyy-MM-dd HH:mm')}">
                        2026-06-25 10:00
                    </span>
                </div>

            </div>

            <!-- 내용 -->
            <div class="prose max-w-none min-h-[350px]"
                 th:utext="${boardDto.content}">
                게시글 내용
            </div>

        </div>

    </div>

    <!-- 버튼 -->
    <div class="flex justify-between mt-8">

        <a href="/board/list"
           th:href="@{/board/list}"
           class="btn btn-outline">
            목록
        </a>

        <div class="flex gap-2">

            <a th:href="@{/board/modify(no=${boardDto.no})}"
               class="btn btn-warning">
                수정
            </a>

            <form th:action="@{/board/delete}"
                  method="post">

                <input type="hidden"
                       name="no"
                       th:value="${boardDto.no}">

                <button class="btn btn-error"
                        type="submit"
                        onclick="return confirm('삭제하시겠습니까?')">
                    삭제
                </button>

            </form>

        </div>

    </div>

</main>

<!-- FOOTER -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
