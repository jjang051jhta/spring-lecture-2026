<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .chart-wrap {
            width: 800px;
            height: 400px;
        }
    </style>
</head>
<body>
<div class="chart-wrap">
    <canvas id="myChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById("myChart");

    new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["짜장면", "짬뽕", "탕수육", "Green", "Purple", "Orange"],
            datasets: [
                {
                    label: "# of Votes",
                    data: [10, 5, 100, 30, 25, 12],
                    borderWidth: 1,
                },
            ],
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                },
            },
        },
    });
</script>
</body>
</html>
