<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .map-container {
            display: flex;
            width: 100%;
            height: 100vh;
            background: #f5f5f5;
        }

        .search-panel {
            width: 280px;
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 2px 0 10px rgba(0,0,0,.08);
            z-index: 10;
        }

        .search-panel h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .search-panel form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-panel input {
            height: 42px;
            padding: 0 12px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        .search-panel input:focus {
            border-color: #4c8bf5;
        }

        .search-panel button {
            height: 42px;
            border: none;
            border-radius: 6px;
            background: #4c8bf5;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .search-panel button:hover {
            background: #2d6cdf;
        }

        #map {
            flex: 1;
            height: 100%;
        }
        .overlaybox {
            position: relative;
            width: 400px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,.25);
            overflow: visible;
        }

        .boxtitle {
            position: relative;
            padding: 14px 18px;
            font-size: 18px;
            font-weight: bold;
            background: #f8f8f8;
            border-bottom: 1px solid #e5e5e5;
        }

        .close {
            position: absolute;
            top: 16px;
            right: 15px;
            width: 17px;
            height: 17px;
            cursor: pointer;
            background: url('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/overlay_close.png') no-repeat center;
        }

        .info-list {
            list-style: none;
            margin: 0;
            padding: 10px 15px 15px 15px;
        }

        .info-list li {
            padding: 8px 0;
            border-bottom: 1px solid #f1f1f1;
            font-size: 14px;
        }

        .info-list li:last-child {
            border-bottom: none;
        }
        .info-list li {
            display: flex;
            align-items: center;   /* flex-start → center */
            gap: 10px;

            padding: 8px 0;
            border-bottom: 1px solid #f1f1f1;
            font-size: 14px;
        }

        .info-list li:last-child {
            border-bottom: none;
        }

        .info-list .icon {
            flex: 0 0 24px;
            width: 24px;
            text-align: center;
            font-size: 16px;
            line-height: 1;
        }

        .info-list .text {
            flex: 1;
            line-height: 1.5;
            white-space: normal;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        .info-list li.address {
            align-items: flex-start;
        }

        .info-list li.address .icon {
            padding-top: 2px;
        }
        /* ▼ 말풍선 화살표 */
        .overlaybox::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%) rotate(45deg);
            width: 18px;
            height: 18px;
            background: #fff;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }
    </style>
    <script type="text/javascript"
            src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1601cd1d108739b235353d7be0cc466f&libraries=services,clusterer"></script>
</head>
<body>
<div class="map-container">
    <div class="search-panel">
        <h3>지역 검색</h3>

        <form id="searchForm">
            <input
                    type="text"
                    id="address"
                    placeholder="예) 제주, 서울, 경기"
                    value="제주">

            <button type="button" id="btn-map">검색</button>
        </form>
    </div>
    <div id="map">

    </div>
</div>

<script>

    const btnMap =  document.querySelector("#btn-map");
    btnMap.addEventListener("click",()=>{
        const addressInput =  document.querySelector("#address");
        const searchAddress =  addressInput.value.trim();
        if (!searchAddress) {
            alert("지역명을 입력하세요.");
            return;
        }
        loadEvCar(searchAddress);
    })

    const map = new kakao.maps.Map(document.getElementById('map'), { // 지도를 표시할 div
        center: new kakao.maps.LatLng(36.2683, 127.6358), // 지도의 중심좌표
        level: 12 // 지도의 확대 레벨
    });
    const arrayChargeTp = ["완속", "급속"];
    const arraycpStat = ["충전가능", "충전중", "고장/점검", "통신장애", "통신미연결", "충전종료", "계획정지"];
    const arrayCpTp = [
        "B타입(5핀)",
        "C타입(5핀)",
        "BC타입(5핀)",
        "BC타입(7핀)",
        "DC차데모",
        "AC3상",
        "DC콤보",
        "DC차데모 + DC콤보",
        "DC차데모 + AC3상",
        "DC차데모 + DC콤보 + AC3상",
        "AC완속(소켓형)",
        "NACS"
    ];

    function makeContent(item) {
        return `
        <div class="overlaybox">
            <div class="boxtitle">
                ${item.csNm}
                <span class="close" onclick="closeOverlay()"></span>
            </div>

            <ul class="info-list">
                <li class="address">
                    <span class="icon">📍</span>
                    <span class="text">${item.addr}</span>
                </li>

                <li>
                    <span class="icon">🔌</span>
                    <span class="text">${arrayChargeTp[item.chargeTp - 1]}</span>
                </li>

                <li>
                    <span class="icon">⚡</span>
                    <span class="text">${arraycpStat[item.cpStat - 1]}</span>
                </li>

                <li>
                    <span class="icon">🚗</span>
                    <span class="text">${arrayCpTp[Number(item.cpTp) - 1]}</span>
                </li>
            </ul>
        </div>
    `;
    }

    // 마커 위에 커스텀오버레이를 표시합니다
    // 마커를 중심으로 커스텀 오버레이를 표시하기위해 CSS를 이용해 위치를 설정했습니다
    const overlay = new kakao.maps.CustomOverlay({
        content: "",
        xAnchor: 0.5,   // 가로 가운데 정렬
        yAnchor: 1.25   // 마커 위쪽으로 올림
    });
    const clusterer = new kakao.maps.MarkerClusterer({
        map: map, // 마커들을 클러스터로 관리하고 표시할 지도 객체
        averageCenter: true, // 클러스터에 포함된 마커들의 평균 위치를 클러스터 마커 위치로 설정
        minLevel: 10 // 클러스터 할 최소 지도 레벨
    });
    // 커스텀 오버레이를 닫기 위해 호출되는 함수입니다
    function closeOverlay() {
        overlay.setMap(null);
    }
    //hoisting
    loadEvCar("제주");

    async function loadEvCar(address) {
        overlay.setMap(null);
        clusterer.clear(); //기존 마커 삭제
        const evCar = await fetch(`/map/ev-car?address=${address}`)
        const json = await evCar.json()
        console.log(json);
        // 마커 클러스터러를 생성합니다

        const markers = json.data.map(function (item, i) {
            const marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(item.lat, item.longi)
            });
            kakao.maps.event.addListener(marker, "click", () => {
                map.panTo(marker.getPosition());

                const content = makeContent(item);
                console.log(content);
                console.log(item);
                overlay.setContent(content);
                overlay.setPosition(marker.getPosition())
                overlay.setMap(map);
            })
            return marker;
        });
        // 클러스터러에 마커들을 추가합니다
        clusterer.addMarkers(markers);

        // 검색된 지역 가운데로 이동
        if (markers.length > 0) {
            const bounds = new kakao.maps.LatLngBounds();

            markers.forEach(marker => {
                bounds.extend(marker.getPosition());
            });

            map.setBounds(bounds);
        } else {
            alert("검색 결과가 없습니다.");
        }

    }


</script>
</body>
</html>
