<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>투표 목록</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-base-200">

<div class="max-w-6xl mx-auto py-10 px-4">

    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">

            <div class="flex justify-between items-center mb-6">
                <h2 class="card-title text-3xl">
                    🗳️ 투표 목록
                </h2>

                <a th:href="@{/vote/write}" class="btn btn-primary">
                    투표 만들기
                </a>
            </div>

            <div class="overflow-x-auto">
                <table class="table table-zebra">
                    <thead>
                    <tr>
                        <th class="w-20 text-center">번호</th>
                        <th>제목</th>
                        <th class="w-64">등록일</th>
                        <th class="w-32 text-center">결과</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${voteDtoList}">
                        <td class="text-center" th:text="${item.voteNo}">
                            1
                        </td>

                        <td>
                            <a class="link link-hover font-semibold text-lg"
                               th:href="@{/vote/{pathVoteNo}(pathVoteNo=${item.voteNo})}"
                               th:text="${item.title}">
                                월드컵
                            </a>
                        </td>

                        <td>
                            <div class="flex flex-col">
                                <span class="text-sm"
                                      th:text="${#temporals.format(item.regDate,'yyyy-MM-dd HH:mm')}">
                                    2026-07-02 10:00
                                </span>

                                <span class="text-xs text-gray-500"
                                      th:text="${item.regDateFormatted}">
                                    3분 전
                                </span>
                            </div>
                        </td>

                        <td class="text-center">
                            <a class="btn btn-sm btn-outline btn-primary"
                               th:href="@{/vote/{voteNo}/result(voteNo=${item.voteNo})}">
                                결과보기
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(voteDtoList)}">
                        <td colspan="4" class="text-center py-10 text-gray-400">
                            등록된 투표가 없습니다.
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
