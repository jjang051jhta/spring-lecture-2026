<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>오늘의 할 일</title>
</head>
<body>
    <h1>오늘의 할 일</h1>
    <div class="list">

        <ul>
            <li th:each="item,stat:${todoList}">
                <span th:text="${item.content}" style="text-decoration: line-through"
                th:style=" ${item.complete} ? 'text-decoration:line-through' : '' "
                >
                </span>
                <form action="/complete" method="post">
                    <input type="hidden" name="index" value="1" th:value="${stat.index}">
                    <button>완료</button>
                </form>
            </li>
        </ul>
    </div>
    <div class="input-box">
        <form method="post" action="/write">
            <input type="text" name="todo" placeholder="할 일을 입력하세요.">
            <button>등록</button>
        </form>
    </div>
</body>
</html>
